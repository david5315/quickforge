<!DOCTYPE html><html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIoT 智慧校园管理平台</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --info: #3498db;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .header-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .header-subtitle {
            color: #666;
            font-size: 1.1rem;
        }
        .user-info {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            margin-top: 15px;
            font-weight: 500;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        .nav-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
        }
        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            border-color: var(--primary);
        }
        .nav-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .nav-card:nth-child(2) .nav-icon {
            background: linear-gradient(135deg, var(--success), #27ae60);
        }
        .nav-card:nth-child(3) .nav-icon {
            background: linear-gradient(135deg, var(--warning), #f39c12);
        }
        .nav-card:nth-child(4) .nav-icon {
            background: linear-gradient(135deg, var(--info), #2980b9);
        }
        .nav-card:nth-child(5) .nav-icon {
            background: linear-gradient(135deg, var(--danger), #c0392b);
        }
        .nav-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .nav-desc {
            color: #7f8c8d;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        .quick-actions {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        .quick-actions h4 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .btn-quick {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 500;
            margin: 5px;
            transition: all 0.3s;
        }
        .btn-quick:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部卡片 -->
        <div class="header-card">
            <h1 class="header-title">
                <i class="fas fa-brain me-2"></i>AIoT 智慧校园管理平台
            </h1>
            <p class="header-subtitle">多模态视觉语言智能体 · 校园管理自动化</p>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle me-1"></i>
                <span id="userName">管理员</span>
            </div>
            <button class="btn btn-outline-secondary btn-sm ms-3" onclick="logout()">
                <i class="fas fa-sign-out-alt me-1"></i>退出
            </button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-number" id="statTasks">3</div>
                <div class="stat-label">运行任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statToday">0</div>
                <div class="stat-label">今日执行</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statLights">0</div>
                <div class="stat-label">关灯次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statRooms">45</div>
                <div class="stat-label">监控教室</div>
            </div>
        </div>

        <!-- 功能导航 -->
        <div class="nav-grid">
            <a href="aiot_config.html" class="nav-card">
                <div class="nav-icon">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="nav-title">任务配置管理</div>
                <div class="nav-desc">
                    查看和管理所有 AI 分析任务配置<br>
                    支持启用/禁用、编辑、删除操作
                </div>
            </a>

            <a href="aiot_config_add.html" class="nav-card">
                <div class="nav-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <div class="nav-title">新增任务</div>
                <div class="nav-desc">
                    自然语言描述生成任务配置<br>
                    选择教室、设置时间、编写提示词
                </div>
            </a>

            <a href="aiot_log.html" class="nav-card">
                <div class="nav-icon">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div class="nav-title">日志查看</div>
                <div class="nav-desc">
                    查看任务执行日志和 AI 分析结果<br>
                    支持筛选、分页、统计
                </div>
            </a>

            <a href="aiot_chat.html" class="nav-card">
                <div class="nav-icon">
                    <i class="fas fa-comments"></i>
                </div>
                <div class="nav-title">AI 对话</div>
                <div class="nav-desc">
                    与企业微信智能机器人对话<br>
                    查询状态、发送指令、获取报告
                </div>
            </a>

            <a href="aiot_admin.html" class="nav-card">
                <div class="nav-icon">
                    <i class="fas fa-cog"></i>
                </div>
                <div class="nav-title">调试管理</div>
                <div class="nav-desc">
                    系统配置、设备管理<br>
                    高级调试功能（管理员专用）
                </div>
            </a>

            <a href="index.html" class="nav-card">
                <div class="nav-icon">
                    <i class="fas fa-home"></i>
                </div>
                <div class="nav-title">返回主页</div>
                <div class="nav-desc">
                    返回智慧校园应用软件平台<br>
                    QuickForge 教学评测系统
                </div>
            </a>
        </div>

        <!-- 快捷操作已移除 -->
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = window.location.origin;

        // 检查登录状态
        function checkAuth() {
            const userStr = localStorage.getItem('teacherUser');
            if (!userStr) {
                window.location.href = 'login.html';
                return null;
            }
            
            const user = JSON.parse(userStr);
            
            // 显示用户信息
            document.getElementById('userName').textContent = `${user.role === 'admin' ? '管理员' : user.name}`;
            
            return user;
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/aiot/tasks`);
                const data = await response.json();
                
                if (data.success) {
                    const tasks = data.tasks || [];
                    const enabledTasks = tasks.filter(t => t.enabled).length;
                    document.getElementById('statTasks').textContent = enabledTasks;
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        // 快捷操作
        async function quickAction(action) {
            switch(action) {
                case 'test_wechat':
                    await testWechatPush();
                    break;
                case 'test_sms':
                    await testSmsNotification();
                    break;
                case 'test_tuya':
                    await testTuyaControl();
                    break;
                case 'capture_test':
                    window.open('aiot_chat.html', '_blank');
                    break;
                case 'run_task6':
                    await runTask6();
                    break;
            }
        }

        // 测试企业微信推送
        async function testWechatPush() {
            const message = prompt('请输入测试消息内容：', '【测试消息】AIoT 系统运行正常！');
            if (!message) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/push/wechat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 推送成功！\n\n' + JSON.stringify(result.result, null, 2));
                } else {
                    alert('❌ 推送失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 推送失败：' + error.message);
            }
        }

        // 测试短信通知
        async function testSmsNotification() {
            const phone = prompt('请输入接收短信的手机号：', '13815120911');
            if (!phone) return;
            
            const message = prompt('请输入短信内容：', '【AIoT 测试】这是一条测试短信，系统运行正常！');
            if (!message) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/push/sms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: phone,
                        message: message
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 短信发送成功！\n\n接收手机：' + phone);
                } else {
                    alert('❌ 短信发送失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 短信发送失败：' + error.message);
            }
        }

        // 测试涂鸦开关控制
        async function testTuyaControl() {
            const classroom = prompt('请输入教室名称（如：高一 13 班）：', '高一 13 班');
            if (!classroom) return;
            
            // 从配置文件获取设备 ID
            try {
                const response = await fetch(`${API_BASE}/api/aiot/classrooms`);
                const data = await response.json();
                
                if (!data.success) {
                    alert('❌ 获取教室数据失败');
                    return;
                }
                
                const classroomData = data.all.find(c => c.classroom === classroom);
                if (!classroomData) {
                    alert('❌ 未找到教室：' + classroom);
                    return;
                }
                
                const deviceId = classroomData.DEVICE_ID || classroomData.device_id;
                const action = confirm(`控制 ${classroom} 的灯光\n\n设备 ID: ${deviceId}\n\n点击"确定"开启，点击"取消"关闭`) ? '开启' : '关闭';
                const state = action === '开启';
                
                const controlResponse = await fetch(`${API_BASE}/api/aiot/iot/control`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        classroom: classroom,
                        device_id: deviceId,
                        device_type: 'lighting',
                        state: state
                    })
                });
                
                const result = await controlResponse.json();
                
                if (result.success) {
                    alert('✅ 控制成功！\n\n' + result.message);
                } else {
                    alert('❌ 控制失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 控制失败：' + error.message);
            }
        }

        // 立即执行无人灯检测任务
        async function runTask6() {
            if (!confirm('⚠️ 立即执行无人灯检测任务？\n\n任务 ID: 6\n任务名称：无人灯检测\n\n这将抓取所有教室画面并进行 AI 分析，确认要执行吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/aiot/task/6/run`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('✅ 任务已启动！\n\n' + result.message + '\n\n请稍后在日志查看页面查看执行结果。');
                } else {
                    alert('❌ 任务启动失败：' + result.message);
                }
            } catch (error) {
                alert('❌ 任务启动失败：' + error.message);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const user = checkAuth();
            if (user) {
                console.log('欢迎，', user.username);
                loadStats();
            }
        });
    </script>


</body></html>
